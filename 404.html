<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — AuditMate MFG</title>
  <link rel="icon" href="favicon.png" />
  <script>
    if (localStorage.getItem("theme") === "dark" ||
        (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="flex flex-col min-h-screen font-sans">
  <div id="navbar"></div>

  <main class="flex-1 w-full flex items-center justify-center py-20">
    <div class="max-w-md mx-auto px-6 text-center">
      <div class="mb-4 flex justify-center text-primary">
        <i data-lucide="file-question" class="h-12 w-12"></i>
      </div>
      <h1 class="text-3xl font-bold mb-3">Page Not Found</h1>
      <p class="text-muted-foreground mb-8">
        The page you're looking for doesn't exist or may have moved.
      </p>
      <div class="flex items-center justify-center gap-3">
        <a href="index.html"
          class="inline-block bg-primary text-primary-foreground font-semibold px-5 py-2.5 rounded-md hover-elevate active-elevate-2 transition-colors">
          Back to Home
        </a>
        <a href="docs.html"
          class="inline-block border border-border font-semibold px-5 py-2.5 rounded-md hover-elevate active-elevate-2 transition-colors">
          Browse Docs
        </a>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script type="module">
    import { renderNavbar } from "./components/navbar.js";
    import { renderFooter } from "./components/footer.js";
    renderNavbar(document.getElementById("navbar"));
    renderFooter(document.getElementById("footer"));
    window.lucide?.createIcons();
  </script>
</body>
</html>
