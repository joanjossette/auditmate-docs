<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditMate MFG Revision Manager — Documentation</title>
  <link rel="icon" href="favicon.png" />
  <script>
    // Apply saved theme before first paint to avoid a flash of the wrong theme.
    if (localStorage.getItem("theme") === "dark" ||
        (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.1.0/dist/fuse.min.js"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="flex flex-col min-h-screen font-sans">
  <div id="navbar"></div>

  <main class="flex-1 w-full">
    <section class="py-20 text-center">
      <div class="max-w-6xl mx-auto px-6">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">AuditMate MFG Revision Manager</h1>
        <p class="text-xl text-muted-foreground mb-12">Smart CNC Program Control</p>
        <div class="max-w-2xl mx-auto" id="home-search"></div>
      </div>
    </section>

    <section class="pb-20">
      <div class="max-w-6xl mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="topic-cards"></div>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
